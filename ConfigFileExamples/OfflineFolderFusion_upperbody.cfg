[DepthGeneration]
DepthCameraCount=1

[Fusion]
FrameCountKeyVolume=1
# The upperbody PNG depth maps do not encode foreground in the top depth bit.
fusion4d_bUseDepthTopBitAsSeg=false
f2f_motion_bUseDepthTopBitAsSeg=false
d2d_LM_iterations=2
m2d_LM_iterations=1

# voxel size
f2f_motion_vxl_res=0.3
fusion4d_vxl_res=0.3

f2f_motion_ed_nodes_res=2.0
fusion4d_ed_nodes_res=2.0

f2f_motion_bBilateralFilter=false
fusion4d_bBilateralFilter=false


#d2d_LM_iterations: meno iterazioni nel tracking frame-to-frame. Grande impatto sulla velocità.
#m2d_LM_iterations: meno iterazioni nel solver Fusion4D. Veloce, ma troppo basso può perdere stabilità.
#*_vxl_res: voxel più grandi = meno geometria = più veloce, ma meno dettaglio.
#*_ed_nodes_res: nodi ED più distanti = grafo più piccolo = solver più veloce, ma deformazioni meno locali.
#*_bBilateralFilter=false: salta filtro depth, più veloce ma più rumoroso.
#Anche da command line:

#aumenta --dump-surface-every, oppure metti 0, se stai esportando mesh spesso
#usa --preview-every 5 o --preview-every 10 se tieni anche la preview OpenCV
#per massima velocità, disattiva --preview e --viewer3d